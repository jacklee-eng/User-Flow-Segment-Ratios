name: Update Segment Ratios

on:
  schedule:
    - cron: "0 1 * * 1" # Every Monday 10:00 KST
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch from Redash
        env:
          REDASH_API_KEY: ${{ secrets.REDASH_API_KEY }}
          REDASH_QUERY_ID: ${{ secrets.REDASH_QUERY_ID }}
          REDASH_URL: ${{ secrets.REDASH_URL }}
        run: |
          curl -fsSL -H "Authorization: Key $REDASH_API_KEY" \
            "$REDASH_URL/api/queries/$REDASH_QUERY_ID/results.json" \
            -o redash_result.json

          node scripts/transform.js redash_result.json data/segments.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/segments.json
          git diff --staged --quiet || git commit -m "chore: update segments $(date +%Y-%m-%d)"
          git push
